<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | MOHCC Zimbabwe</title>
    <link rel="icon" href="/logo.png" type="image/png">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        :root {
            --color-moh-green: #00843D;
            --color-moh-gold: #FFD200;
            --color-moh-red: #D40000;
            --color-moh-bg: #61ba61;
            --color-moh-sidebar: #00843D;
        }
        
        body {
            background-color: #61ba61 !important;
        }
        
        .bg-moh-bg {
            background-color: #61ba61 !important;
        }
        
        .bg-moh-sidebar {
            background-color: #00843D !important;
        }
        
        .text-moh-gold {
            color: #FFD200 !important;
        }
        
        .bg-moh-green {
            background-color: #00843D !important;
        }
        
        .text-moh-green {
            color: #00843D !important;
        }
        
        .ring-moh-green {
            --tw-ring-color: #00843D !important;
        }
    </style>
</head>
<body class="bg-moh-bg min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
        <div class="bg-moh-sidebar p-8 text-white text-center">
            <div class="flex justify-center mb-4">
                <img src="/logo.png" alt="MOHCC Logo" class="w-24 h-24 object-contain">
            </div>
            <h1 class="text-sm font-bold uppercase tracking-widest">Ministry of Health</h1>
            <p class="text-white mt-1 text-sm font-medium uppercase tracking-tighter">And Child Care Zimbabwe</p>
            <p class="text-white mt-2 text-sm font-semibold uppercase tracking-wide">Password Reset</p>
        </div>

        <form id="forgotPasswordForm" class="p-8 space-y-6">
            <div id="successMessage" class="hidden bg-green-50 text-moh-green p-4 rounded-xl text-sm border border-green-100 font-medium flex items-center gap-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
                <span></span>
            </div>
            <div id="errorMessage" class="hidden bg-red-50 text-moh-red p-4 rounded-xl text-sm border border-red-100 font-medium flex items-center gap-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
                <span></span>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Username, Email or Phone</label>
                <div class="relative">
                    <input type="text" id="identifier" name="identifier" required class="w-full px-4 py-3 pl-11 rounded-xl border border-gray-200 focus:ring-2 focus:ring-moh-green outline-none transition-all text-sm" placeholder="Enter your username, email or phone">
                    <svg class="w-5 h-5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                </div>
                <button type="button" id="requestOtpBtn" class="mt-3 w-full bg-moh-green hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg uppercase tracking-widest text-sm flex items-center justify-center gap-2">
                    <span id="requestOtpText">Request OTP</span>
                    <svg id="requestOtpSpinner" class="w-5 h-5 animate-spin hidden" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>

            <div id="otpSection" class="hidden">
                <div class="border-t border-gray-200 pt-6">
                    <h2 class="text-sm font-bold text-gray-700 uppercase tracking-widest mb-4">Verify Identity</h2>
                </div>

                <div id="userInfo" class="bg-green-50 p-4 rounded-xl mb-4 hidden">
                    <p class="text-sm text-green-800 font-medium">OTP sent to: <span id="userContact" class="font-bold"></span></p>
                </div>

                <div id="securityQuestionSection" class="mt-6 hidden">
                    <div class="border-t border-gray-200 pt-6">
                        <h2 class="text-sm font-bold text-gray-700 uppercase tracking-widest mb-4">Security Question</h2>
                    </div>

                    <div class="bg-blue-50 p-4 rounded-xl mb-4">
                        <p class="text-sm text-blue-800 font-medium" id="securityQuestionText"></p>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Your Answer</label>
                        <div class="relative">
                            <input type="text" id="securityAnswer" name="securityAnswer" required class="w-full px-4 py-3 pl-11 rounded-xl border border-gray-200 focus:ring-2 focus:ring-moh-green outline-none transition-all text-sm" placeholder="Enter your answer">
                            <svg class="w-5 h-5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Enter OTP</label>
                    <div class="relative">
                        <input type="text" id="otp" name="otp" required maxlength="6" class="w-full px-4 py-3 pl-11 rounded-xl border border-gray-200 focus:ring-2 focus:ring-moh-green outline-none transition-all text-sm text-center text-2xl font-bold tracking-widest" placeholder="000000">
                        <svg class="w-5 h-5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                        </svg>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">OTP expires in 10 minutes</p>
                </div>
            </div>

            <div id="passwordSection" class="hidden">
                <div class="border-t border-gray-200 pt-6">
                    <h2 class="text-sm font-bold text-gray-700 uppercase tracking-widest mb-4">New Password</h2>
                </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="newPassword" name="newPassword" required class="w-full px-4 py-3 pl-11 pr-11 rounded-xl border border-gray-200 focus:ring-2 focus:ring-moh-green outline-none transition-all text-sm" placeholder="Enter new password">
                    <svg class="w-5 h-5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                    <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
                        <svg class="w-5 h-5" id="eyeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                        </svg>
                    </button>
                </div>
                <!-- Password Strength Indicator -->
                <div class="mt-3">
                    <div class="flex gap-1 mb-2">
                        <div id="strengthBar1" class="h-1 flex-1 rounded-full bg-gray-200 transition-colors"></div>
                        <div id="strengthBar2" class="h-1 flex-1 rounded-full bg-gray-200 transition-colors"></div>
                        <div id="strengthBar3" class="h-1 flex-1 rounded-full bg-gray-200 transition-colors"></div>
                        <div id="strengthBar4" class="h-1 flex-1 rounded-full bg-gray-200 transition-colors"></div>
                    </div>
                    <p id="strengthText" class="text-xs text-gray-500">Password strength</p>
                </div>
                <!-- Password Requirements -->
                <div class="mt-3 space-y-1">
                    <p id="reqLength" class="text-xs text-gray-400 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                        At least 8 characters
                    </p>
                    <p id="reqUppercase" class="text-xs text-gray-400 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                        One uppercase letter
                    </p>
                    <p id="reqLowercase" class="text-xs text-gray-400 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                        One lowercase letter
                    </p>
                    <p id="reqNumber" class="text-xs text-gray-400 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                        One number
                    </p>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Confirm Password</label>
                <div class="relative">
                    <input type="password" id="confirmPassword" name="confirmPassword" required class="w-full px-4 py-3 pl-11 rounded-xl border border-gray-200 focus:ring-2 focus:ring-moh-green outline-none transition-all text-sm" placeholder="Confirm new password">
                    <svg class="w-5 h-5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <p id="matchStatus" class="text-xs mt-1 text-gray-400">Passwords do not match</p>
            </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-moh-green hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg uppercase tracking-widest text-sm flex items-center justify-center gap-2">
                <span id="btnText">Reset Password</span>
                <svg id="btnSpinner" class="w-5 h-5 animate-spin hidden" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>

            <div class="text-center">
                <a href="/login" class="text-sm text-moh-green hover:text-green-700 font-medium transition-colors flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Back to Login
                </a>
            </div>
        </form>
    </div>
    
    <script src="/js/forgot-password.js"></script>
</body>
</html>
